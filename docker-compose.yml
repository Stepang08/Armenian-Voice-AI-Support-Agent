version: "3.9"
services:
  livekit:
    image: livekit/livekit-server:v1.7
    container_name: livekit-server
    ports:
      - "7890:7880"
      - "7891:7881"
      - "40000-40200:40000-40200/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml --dev
    restart: unless-stopped
